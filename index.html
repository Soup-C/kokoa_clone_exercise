<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SunnyTalk (Web)</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <main class="stage">
      <!-- =========================
           SCREEN 1: LOGIN
      ========================== -->
      <section class="phone phone--login" aria-label="Login screen">
        <!-- status bar -->
        <header class="status-bar" aria-label="Status bar">
          <div class="status-bar__col">
            <span class="status-bar__time">16:21</span>
          </div>
          <div class="status-bar__col">
            <span>No Service</span>
          </div>
          <div class="status-bar__col status-bar__col--right">
            <i class="fa-solid fa-wifi"></i>
            <i class="fa-solid fa-battery-half"></i>
            <span>50%</span>
          </div>
        </header>

        <main class="login">
          <section class="login-hero" aria-label="Login hero">
            <div class="login-hero__photo" aria-hidden="true"></div>
            <h1 class="login-hero__title">Welcome to Soup-C Chat</h1>
            <p class="login-hero__text">
              Kokoa clone chat.
            </p>
          </section>

          <section class="login-form-wrap" aria-label="Login form">
            <form class="login-form">
              <label class="login-form__label" for="email">Email</label>
              <input
                id="email"
                type="email"
                placeholder="sunny@example.com"
                required
              />

              <label class="login-form__label" for="pw">Password</label>
              <input
                id="pw"
                type="password"
                placeholder="********"
                minlength="8"
                required
              />

              <button class="login-form__submit" type="submit">
                Log In
              </button>

              <a class="login-form__link" href="#">
                Find account / Reset password
              </a>
            </form>
          </section>
        </main>
      </section>

      <section class="phone phone--chat" aria-label="Chat screen">
        <!-- status bar -->
        <header class="status-bar status-bar--onchat" aria-label="Status bar">
          <div class="status-bar__col">
            <span class="status-bar__time">16:22</span>
          </div>
          <div class="status-bar__col">
            <span>LTE</span>
          </div>
          <div class="status-bar__col status-bar__col--right">
            <i class="fa-solid fa-signal"></i>
            <i class="fa-solid fa-battery-three-quarters"></i>
            <span>50%</span>
          </div>
        </header>

        <header class="alt-header" aria-label="Chat header">
          <div class="alt-header__col">
            <button class="icon-btn" type="button" aria-label="Back">
              <i class="fa-solid fa-arrow-left"></i>
            </button>
          </div>

          <div class="alt-header__col alt-header__col--center">
            <h2 class="alt-header__title">Soup-C 단톡</h2>
          </div>

          <div class="alt-header__col alt-header__col--right">
            <button class="icon-btn" type="button" aria-label="Search">
              <i class="fa-solid fa-magnifying-glass"></i>
            </button>
            <button class="icon-btn" type="button" aria-label="Menu">
              <i class="fa-solid fa-bars"></i>
            </button>
          </div>
        </header>

        <!-- chat messages area (scroll) -->
        <main class="chat">
          <div class="chat__timestamp">Thursday, 16:20</div>

          <!-- received message -->
          <section class="message-row" aria-label="Incoming message">
            <div class="message-row__avatar" aria-hidden="true"></div>

            <div class="message">
              <span class="message__author">미나</span>
              <div class="message__info">
                <p class="message__bubble">
                  이게 되네?
                </p>
                <span class="message__time">16:20</span>
              </div>
            </div>
          </section>

          <section class="message-row message-row--own" aria-label="My message">
            <div class="message">
              <div class="message__info">
                <p class="message__bubble">
                  그러게.
                </p>
                <span class="message__time">16:21</span>
              </div>
            </div>
          </section>

          <!-- received message -->
          <section class="message-row" aria-label="Incoming message">
            <div class="message-row__avatar message-row__avatar--2" aria-hidden="true"></div>

            <div class="message">
              <span class="message__author">재형</span>
              <div class="message__info">
                <p class="message__bubble">
                  이게 되냐?.
                </p>
                <span class="message__time">16:21</span>
              </div>
            </div>
          </section>

          <section class="message-row message-row--own" aria-label="My message">
            <div class="message">
              <div class="message__info">
                <p class="message__bubble">
                  그러게!
                </p>
                <span class="message__time">16:22</span>
              </div>
            </div>
          </section>

          <section class="message-row" aria-label="Incoming message">
            <div class="message-row__avatar" aria-hidden="true"></div>
            <div class="message">
              <span class="message__author">미나</span>
              <div class="message__info">
                <p class="message__bubble">쫌 치네.</p>
                <span class="message__time">16:22</span>
              </div>
            </div>
          </section>
        </main>

        <footer class="reply" aria-label="Reply box">
          <div class="reply__col">
            <button class="icon-btn" type="button" aria-label="Add">
              <i class="fa-solid fa-plus"></i>
            </button>
          </div>

          <div class="reply__col reply__col--input">
            <label class="sr-only" for="msg">Message</label>
            <input id="msg" type="text" placeholder="대화를 입력하시오..." />

            <i class="fa-regular fa-face-smile"></i>
            <button class="reply__send" type="button" aria-label="Send">
              <i class="fa-solid fa-arrow-up"></i>
            </button>
          </div>
        </footer>
      </section>
    </main>
  </body>
</html>
